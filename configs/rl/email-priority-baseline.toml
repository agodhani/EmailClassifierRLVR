# Baseline survey — one pass through all training emails, no real learning intended.
# batch_size=1 means one email per step, so per-step rewards = per-email accuracy.
# max_steps=164 = one full pass through the train split (80% of 205 emails).

model = "nvidia/OpenReasoning-Nemotron-7B"
max_steps = 164
batch_size = 1
rollouts_per_example = 1

[sampling]
max_tokens = 2048

[[env]]
id = "lostzoro003/email-priority"
args = { split = "train", num_examples = -1 }   # use all training emails

# Validation on held-out eval split (~41 emails) at start and end.
[val]
num_examples = 41
rollouts_per_example = 1
interval = 164              # only at step 0 and end

