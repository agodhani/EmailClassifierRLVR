model = "nvidia/OpenReasoning-Nemotron-7B"
max_steps = 50
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 2048

[[env]]
id = "lostzoro003/email-priority"             # replace with your Prime Hub slug after: prime env push --path ./environments/email_priority

# Optional: W&B logging
# [wandb]
# project = "email-priority"
# name = "qwen3-30b-email-priority"

# Optional: online evaluation
# [eval]
# interval = 50
# num_examples = 50
# rollouts_per_example = 1
# eval_base_model = true
#
# [[eval.env]]
# id = "email-priority"
# args = { split = "eval" }

[val]
num_examples = 21           # full eval split (~20% of 107)
rollouts_per_example = 1
interval = 10               # every 10 steps out of 50
